name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: amdjedkh
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=00d4ff&color_dots=#0a192f,#112240,#1e3a5f,#00d4ff,#64ffda

      - name: Push to output branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output
          folder: dist

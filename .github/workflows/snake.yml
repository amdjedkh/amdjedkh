name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: amdjedkh
          outputs: |
            github-snake-dark.svg?palette=github-dark&color_snake=00d4ff&color_dots=#0a192f,#112240,#1e3a5f,#00d4ff,#64ffda

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-snake-dark.svg
          git diff --cached --quiet || git commit -m "Update snake animation"
          git push
